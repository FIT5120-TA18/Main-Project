<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <div class="container nav-inner">
      <div class="nav-brand">
        <a href="{{ url_for('main.landing') }}" class="logo-link">
          <img
            src="{{ url_for('static', filename='img/hermap-logo.png') }}"
            alt="Hermap Logo"
            class="logo"
          />
        </a>
      </div>

      <div class="nav-links">
        <a href="{{ url_for('main.landing') }}" class="nav-link">Home</a>
        <a href="{{ url_for('main.landing') }}#how-it-works" class="nav-link">How it works</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Gemini-generated financial insight -->
    <section class="insight-card">
      <h2 class="insight-title">Your Financial Snapshot</h2>
      <p class="insight-label">Based on your details</p>

      <p
        id="typewriter-text"
        data-text="{{ financial_fact | e }}"
      ></p>
    </section>

    <!-- Dashboard insights section -->
    <section class="dashboard-insights-section">
      <!-- <div class="insights-header">
        <h2>Insights</h2>
        <p>Click on the graph to learn more</p>
      </div> -->

      <div class="insights-grid">
        <!-- <div class="insight-graph-card"> -->
          <!-- <canvas id="industryInsightChart"></canvas> -->
        <!-- </div> -->

        <div class="insight-graph-card feature-card">
          <a href="{{ url_for('main.income_comparison') }}" style="text-decoration: none; color: inherit; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;">
            <div style="font-size: 32px; background: linear-gradient(135deg, #e8546a 0%, #c45fa8 50%, #9b72cf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
              📊
            </div>
            <div style="text-align: center;">
              <p style="margin: 0 0 8px 0; font-weight: 600; font-size: 16px;">See How Your Peers are Doing</p>
              <p style="margin: 0; font-size: 13px; color: var(--text-muted);">Compare your income across Victoria</p>
            </div>
          </a>
        </div>

        <div class="insight-graph-card feature-card">
          <a href="{{ url_for('main.rent_comparison') }}" style="text-decoration: none; color: inherit; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;">
            <div style="font-size: 32px; background: linear-gradient(135deg, #e8546a 0%, #c45fa8 50%, #9b72cf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
              🗺️
            </div>
            <div style="text-align: center;">
              <p style="margin: 0 0 8px 0; font-weight: 600; font-size: 16px;">Explore Affordable Living</p>
              <p style="margin: 0; font-size: 13px; color: var(--text-muted);">Compare rent across locations</p>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="{{ url_for('main.landing') }}" class="logo-link">
          <img
            src="{{ url_for('static', filename='img/hermap-logo.png') }}"
            alt="Hermap Logo"
            class="logo"
          />
        </a>
      </div>

      <div class="nav-links">
        <a href="#" class="nav-link">Privacy Policy</a>
        <a href="#" class="nav-link">ABS Data Sources</a>
        <a href="#" class="nav-link">Terms of Service</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
