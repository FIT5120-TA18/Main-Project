<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <main class="page-shell">
    <section class="wizard-card fade-in-up" style="max-width: 1000px;">
      <div style="margin-bottom: 32px;">
        <a href="/pathway-builder" style="color: #1f3c88; text-decoration: none; font-weight: 600; margin-bottom: 16px; display: inline- Edit profile</a>block;">
        <h1 class="form-title">Your financial breakdown</h1>
        <p class="form-subtitle">Here's what your monthly money situation looks like across each pathway.</p>
      </div>

      <div class="results-container" id="resultsContainer">
        <!-- Results cards will be populated dynamically -->
      </div>

      <p style="font-size: 0.85rem; color: #666; margin-top: 32px; padding-top: 16px; border-top: 1px solid #e0e0e0;">
        <strong>Data sources:</strong> Estimates based on ABS Personal Income 23, ABS Housing Occupancy & Costs 20, and SGS RAI 2025. Adjusted for wage and rent growth to 2026.20192022
      </p>

      <div class="form-actions" style="margin-top: 32px;">
        <a href="/" class="secondary-button" style="text-decoration: none; display: inline-flex; align-items:  Start over</a>center;">
        <a href="/education/housing-stress" class="cta-button primary-button" style="text-decoration: none; display: inline-flex; align-items: center;">Learn more about budgeting</a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Mock data structure (in production, this would come from session/backend)
      const mockResults = {
        pathwayA: {
          name: "Pathway A",
          weeklyIncomeMin: 520,
          weeklyIncomeMax: 680,
          weeklyRentMin: 140,
          weeklyRentMax: 220,
          monthlyEssentials: 280,
          isStressRisk: false
        },
        pathwayB: {
          name: "Pathway B",
          weeklyIncomeMin: 380,
          weeklyIncomeMax: 520,
          weeklyRentMin: 140,
          weeklyRentMax: 220,
          monthlyEssentials: 280,
          isStressRisk: true
        }
      };

      function formatCurrency(value) {
        return "$" + Math.round(value).toLocaleString('en-AU');
      }

      function calculateMonthlySurplus(incomeMin, incomeMax, rentMin, rentMax, essentials) {
        const incomeMid = (incomeMin + incomeMax) / 2;
        const rentMid = (rentMin + rentMax) / 2;
        const monthlyIncome = incomeMid * 4.33;
        const monthlyRent = rentMid * 4.33;
        return monthlyIncome - monthlyRent - essentials;
      }

      function calculateStressRatio(rentMid, incomeMid) {
        return rentMid / incomeMid;
      }

      function createResultCard(data) {
        const surplus = calculateMonthlySurplus(
          data.weeklyIncomeMin,
          data.weeklyIncomeMax,
          data.weeklyRentMin,
          data.weeklyRentMax,
          data.monthlyEssentials
        );

        const incomeMid = (data.weeklyIncomeMin + data.weeklyIncomeMax) / 2;
        const rentMid = (data.weeklyRentMin + data.weeklyRentMax) / 2;
        const stressRatio = calculateStressRatio(rentMid, incomeMid);
        const isStressed = stressRatio > 0.30;

        const surplusClass = surplus >= 0 ? "positive" : "negative";
";

        const affordabilityBadge = isStressed 
          ? '<span class="affordability-badge stress-risk">Housing Stress Risk</span>'
          : '<span class="affordability-badge affordable">Affordable</span>';

        const affordabilityNote = isStressed
</a></div>'
          : '<div class="affordability-note safe">Estimated rent is within the 30% affordability threshold for your income range.</div>';

        const benchmarkSection = `
          <div class="benchmark-section">
            <div class="benchmark-title">How does this compare?</div>
            <div class="benchmark-item">
              <span class="benchmark-label">Your estimated income:</span>
              <span class="benchmark-value">${formatCurrency(data. ${formatCurrency(data.weeklyIncomeMax)} / week</span>weeklyIncomeMin)} 
            </div>
            <div class="benchmark-item">
              <span class="benchmark-label">Median for women 22 in NSW:</span>18
              <span class="benchmark-value">$650 / week</span>
            </div>
            <div class="benchmark- Typical for your cohort in NSW</div>indicator">
            <div style="font-size: 0.8rem; color: #999; margin-top: 8px;">Source: ABS Personal Income 23</div>2022
          </div>
        `;

        return `
          <div class="results-card">
            <h2 class="results-pathway-name">${data.name}</h2>

            <div class="result-item">
              <div class="result-label">Estimated weekly income</div>
              <div class="result-value">${formatCurrency(data. ${formatCurrency(data.weeklyIncomeMax)}</div>weeklyIncomeMin)} 
            </div>

            <div class="result-item">
              <div class="result-label">Estimated weekly rent</div>
              <div class="result-value">${formatCurrency(data. ${formatCurrency(data.weeklyRentMax)}</div>weeklyRentMin)} 
            </div>

            <div class="result-item">
              <div class="result-label">Monthly essentials</div>
              <div class="result-value">${formatCurrency(data.monthlyEssentials)}</div>
            </div>

            <div class="monthly-surplus ${surplusClass}">
              <div class="monthly-surplus-label">Monthly surplus or deficit</div>
              <div class="monthly-surplus-amount">${surplusSign}${formatCurrency(Math.abs(surplus))}</div>
            </div>

            ${affordabilityBadge}
            ${affordabilityNote}

            ${benchmarkSection}
          </div>
        `;
      }

      const container = document.getElementById("resultsContainer");
      const hasPathwayB = sessionStorage.getItem("hasPathwayB") === "true" || false;

      container.innerHTML = createResultCard(mockResults.pathwayA);
      if (hasPathwayB) {
        container.innerHTML += createResultCard(mockResults.pathwayB);
      }
    });
  </script>
</body>
</html>
